<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --text2: #6b6b80;
    --work: #ff6b6b;
    --work-dim: rgba(255,107,107,0.15);
    --break: #51cf66;
    --break-dim: rgba(81,207,102,0.15);
    --long: #339af0;
    --long-dim: rgba(51,154,240,0.15);
    --radius: 16px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.5s, color 0.5s; }

  /* LIGHT MODE */
  body.light {
    --bg: #f7f7f5; --surface: #ffffff; --surface2: #f0f0ee;
    --border: rgba(0,0,0,0.08); --text: #1a1a1a; --text2: #888;
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes ringPop { 0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)} }

  .navbar { padding: 0 2rem; height: 58px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .navbar-brand { font-family:'Space Mono',monospace; font-size:1rem; font-weight:700; letter-spacing:-0.02em; display:flex; align-items:center; gap:10px; }
  .nav-right { display:flex; align-items:center; gap:0.75rem; }
  .nav-back { font-size:0.78rem; color:var(--text2); text-decoration:none; font-weight:600; transition:color 0.2s; }
  .nav-back:hover { color:var(--text); }
  .theme-btn { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .theme-btn:hover { color:var(--text); }

  .main { max-width: 560px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* MODE TABS */
  .mode-tabs { display:flex; gap:0.5rem; margin-bottom:2rem; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; animation: fadeUp 0.4s ease; }
  .mode-tab { flex:1; padding:0.55rem; border:none; border-radius:9px; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600; color:var(--text2); cursor:pointer; transition:all 0.2s; text-align:center; }
  .mode-tab.active { color:#fff; }
  .mode-tab.work.active { background:var(--work); box-shadow:0 2px 8px rgba(255,107,107,0.3); }
  .mode-tab.break.active { background:var(--break); box-shadow:0 2px 8px rgba(81,207,102,0.3); }
  .mode-tab.long.active { background:var(--long); box-shadow:0 2px 8px rgba(51,154,240,0.3); }

  /* TIMER CIRCLE */
  .timer-wrap { display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; animation: fadeUp 0.4s 0.05s ease both; }

  .ring-wrap { position:relative; width:240px; height:240px; margin-bottom:1.5rem; }
  .ring-svg { width:100%; height:100%; transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--border); stroke-width:8; }
  .ring-fill { fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke 0.5s; }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }

  .timer-display { font-family:'Space Mono',monospace; font-size:3.2rem; font-weight:700; letter-spacing:-0.02em; line-height:1; }
  .timer-mode-label { font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text2); }

  /* CONTROLS */
  .controls { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
  .btn-main { width:64px; height:64px; border-radius:50%; border:none; cursor:pointer; font-size:1.5rem; display:flex; align-items:center; justify-content:center; transition:transform 0.15s, box-shadow 0.2s; flex-shrink:0; }
  .btn-main:hover { transform:scale(1.05); }
  .btn-main:active { transform:scale(0.97); }
  .btn-main.work { background:var(--work); box-shadow:0 4px 20px rgba(255,107,107,0.4); }
  .btn-main.break { background:var(--break); box-shadow:0 4px 20px rgba(81,207,102,0.4); }
  .btn-main.long { background:var(--long); box-shadow:0 4px 20px rgba(51,154,240,0.4); }

  .btn-secondary { width:44px; height:44px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); color:var(--text2); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .btn-secondary:hover { color:var(--text); border-color:var(--text2); }

  /* MOTIVATION */
  .motivation { text-align:center; font-size:0.85rem; color:var(--text2); min-height:1.4rem; margin-bottom:1.75rem; transition:opacity 0.4s; font-style:italic; animation: fadeIn 0.4s ease; }

  /* STATS */
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:0.65rem; margin-bottom:1.75rem; animation: fadeUp 0.4s 0.1s ease both; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0.9rem; text-align:center; }
  .stat-num { font-family:'Space Mono',monospace; font-size:1.6rem; font-weight:700; line-height:1; margin-bottom:0.25rem; }
  .stat-label { font-size:0.65rem; color:var(--text2); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
  .stat-card.work-stat .stat-num { color:var(--work); }
  .stat-card.break-stat .stat-num { color:var(--break); }
  .stat-card.time-stat .stat-num { color:var(--long); }

  /* SESSIONS */
  .sessions-row { display:flex; gap:6px; justify-content:center; margin-bottom:1.75rem; flex-wrap:wrap; }
  .session-dot { width:10px; height:10px; border-radius:50%; background:var(--border); transition:background 0.3s, transform 0.2s; }
  .session-dot.done { background:var(--work); transform:scale(1.1); }
  .session-dot.break-done { background:var(--break); }

  /* SETTINGS */
  .settings-toggle { display:flex; align-items:center; gap:8px; font-size:0.75rem; font-weight:600; color:var(--text2); cursor:pointer; padding:0.5rem 0; border-top:1px solid var(--border); margin-bottom:0; user-select:none; transition:color 0.2s; animation: fadeUp 0.4s 0.15s ease both; }
  .settings-toggle:hover { color:var(--text); }
  .settings-arrow { transition:transform 0.2s; }
  .settings-arrow.open { transform:rotate(90deg); }

  .settings-panel { display:none; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-top:0.75rem; animation: fadeIn 0.2s ease; }
  .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.85rem; }
  .setting-group { display:flex; flex-direction:column; gap:0.4rem; }
  .setting-label { font-size:0.68rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text2); }
  .setting-input { padding:0.55rem 0.8rem; border:1.5px solid var(--border); border-radius:9px; font-family:'Space Mono',monospace; font-size:0.88rem; color:var(--text); background:var(--surface2); outline:none; transition:border-color 0.2s; width:100%; }
  .setting-input:focus { border-color:var(--work); }
  .btn-apply { margin-top:0.75rem; width:100%; padding:0.65rem; background:var(--work); border:none; border-radius:10px; color:#fff; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:700; cursor:pointer; transition:opacity 0.2s; }
  .btn-apply:hover { opacity:0.88; }

  /* TOAST */
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0.75rem 1.25rem; font-size:0.85rem; font-weight:600; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.3); z-index:999; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🍅 Pomodoro</div>
  <div class="nav-right">
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
    <a href="index.html" class="nav-back">← Dashboard</a>
  </div>
</nav>

<main class="main">

  <div class="mode-tabs">
    <button class="mode-tab work active" onclick="setMode('work', this)">🔥 Práce</button>
    <button class="mode-tab break" onclick="setMode('break', this)">☕ Pauza</button>
    <button class="mode-tab long" onclick="setMode('long', this)">🌿 Dlouhá pauza</button>
  </div>

  <div class="timer-wrap">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 240 240">
        <circle class="ring-bg" cx="120" cy="120" r="108"/>
        <circle class="ring-fill" id="ring" cx="120" cy="120" r="108" stroke="var(--work)" stroke-dasharray="678.6" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-mode-label" id="mode-label">Čas pracovat</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-secondary" onclick="resetTimer()" title="Reset">↺</button>
      <button class="btn-main work" id="play-btn" onclick="toggleTimer()">▶</button>
      <button class="btn-secondary" onclick="skipMode()" title="Přeskočit">⏭</button>
    </div>
  </div>

  <div class="motivation" id="motivation">Připrav se na soustředění! 💪</div>

  <div class="stats">
    <div class="stat-card work-stat">
      <div class="stat-num" id="stat-sessions">0</div>
      <div class="stat-label">Bloků</div>
    </div>
    <div class="stat-card break-stat">
      <div class="stat-num" id="stat-breaks">0</div>
      <div class="stat-label">Pauz</div>
    </div>
    <div class="stat-card time-stat">
      <div class="stat-num" id="stat-time">0</div>
      <div class="stat-label">Minut</div>
    </div>
  </div>

  <div class="sessions-row" id="sessions-row"></div>

  <div class="settings-toggle" onclick="toggleSettings()">
    <span class="settings-arrow" id="settings-arrow">▶</span>
    Nastavení časů
  </div>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-grid">
      <div class="setting-group">
        <label class="setting-label">Práce (min)</label>
        <input class="setting-input" type="number" id="set-work" value="25" min="1" max="60">
      </div>
      <div class="setting-group">
        <label class="setting-label">Krátká pauza (min)</label>
        <input class="setting-input" type="number" id="set-break" value="5" min="1" max="30">
      </div>
      <div class="setting-group">
        <label class="setting-label">Dlouhá pauza (min)</label>
        <input class="setting-input" type="number" id="set-long" value="15" min="5" max="60">
      </div>
      <div class="setting-group">
        <label class="setting-label">Bloků do dl. pauzy</label>
        <input class="setting-input" type="number" id="set-cycle" value="4" min="2" max="8">
      </div>
    </div>
    <button class="btn-apply" onclick="applySettings()">Použít nastavení</button>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
var WORK_MSGS = [
  'Soustřeď se, zvládneš to! 💪', 'Jeden krok za druhým. 🚀',
  'Mozek v plném výkonu! 🧠', 'Žádné rušení, jen práce. 🎯',
  'Tenhle blok bude tvůj! ⚡', 'Jdeš na to skvěle! 🔥',
  'Soustředění = úspěch. 📚', 'Každá minuta se počítá! ⏱️'
];
var BREAK_MSGS = [
  'Zasloužená pauza! ☕', 'Protáhni se a oddechni. 🧘',
  'Dobře odvedená práce! 🎉', 'Dej mozku odpočinek. 🌿',
  'Napiješ se vody? 💧', 'Jsi na správné cestě! ✨'
];
var DONE_MSGS = [
  'Výborně! Další blok za tebou! 🏆', 'Neuvěřitelné soustředění! 🔥',
  'Jsi stroj! Tak dál! 💪', 'Produktivita na max! 🚀'
];

var settings = { work: 25, breakTime: 5, longBreak: 15, cycle: 4 };
var mode = 'work';
var timeLeft = settings.work * 60;
var totalTime = settings.work * 60;
var running = false;
var interval = null;
var sessionsCompleted = 0;
var breaksCompleted = 0;
var totalMinutes = 0;
var isLight = false;

var audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

function playSound(type) {
  try {
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'done') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.8);
    } else {
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }
  } catch(e) {}
}

function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
}

function setMotivation(msgs) {
  var el = document.getElementById('motivation');
  el.style.opacity = '0';
  setTimeout(function() {
    el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    el.style.opacity = '1';
  }, 300);
}

function updateDisplay() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  document.getElementById('timer-display').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  var progress = 1 - (timeLeft / totalTime);
  var circumference = 678.6;
  document.getElementById('ring').style.strokeDashoffset = circumference * (1 - progress);

  document.title = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + ' — Pomodoro';
}

function setMode(m, btn) {
  mode = m;
  running = false; clearInterval(interval);
  document.getElementById('play-btn').textContent = '▶';

  if (m === 'work') { timeLeft = settings.work * 60; }
  else if (m === 'break') { timeLeft = settings.breakTime * 60; }
  else { timeLeft = settings.longBreak * 60; }
  totalTime = timeLeft;

  var colors = { work: 'var(--work)', break: 'var(--break)', long: 'var(--long)' };
  var labels = { work: 'Čas pracovat', break: 'Krátká pauza', long: 'Dlouhá pauza' };
  document.getElementById('ring').style.stroke = colors[m];
  document.getElementById('mode-label').textContent = labels[m];

  var playBtn = document.getElementById('play-btn');
  playBtn.className = 'btn-main ' + (m === 'long' ? 'long' : m === 'break' ? 'break' : 'work');

  document.querySelectorAll('.mode-tab').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');

  var motMsgs = m === 'work' ? WORK_MSGS : BREAK_MSGS;
  setMotivation(motMsgs);
  updateDisplay();
}

function toggleTimer() {
  if (running) {
    running = false; clearInterval(interval);
    document.getElementById('play-btn').textContent = '▶';
    setMotivation(['Pauza... Hned zpět! 💡']);
  } else {
    running = true;
    document.getElementById('play-btn').textContent = '⏸';
    setMotivation(mode === 'work' ? WORK_MSGS : BREAK_MSGS);
    interval = setInterval(function() {
      if (timeLeft <= 0) { timerDone(); return; }
      timeLeft--;
      if (mode === 'work') totalMinutes = Math.floor((settings.work * 60 - timeLeft) / 60 + sessionsCompleted * settings.work);
      updateDisplay();
      updateStats();
    }, 1000);
  }
}

function timerDone() {
  clearInterval(interval); running = false;
  document.getElementById('play-btn').textContent = '▶';
  playSound('done');

  if (mode === 'work') {
    sessionsCompleted++;
    updateSessions();
    showToast(DONE_MSGS[Math.floor(Math.random() * DONE_MSGS.length)]);
    totalMinutes += settings.work;
    if (sessionsCompleted % settings.cycle === 0) {
      setMode('long', document.querySelectorAll('.mode-tab')[2]);
    } else {
      setMode('break', document.querySelectorAll('.mode-tab')[1]);
    }
  } else {
    if (mode === 'break') breaksCompleted++;
    showToast('Pauza skončila! Zpět do práce! 💪');
    setMode('work', document.querySelectorAll('.mode-tab')[0]);
  }
  updateStats();
}

function resetTimer() {
  clearInterval(interval); running = false;
  document.getElementById('play-btn').textContent = '▶';
  if (mode === 'work') timeLeft = settings.work * 60;
  else if (mode === 'break') timeLeft = settings.breakTime * 60;
  else timeLeft = settings.longBreak * 60;
  totalTime = timeLeft;
  updateDisplay();
  setMotivation(mode === 'work' ? WORK_MSGS : BREAK_MSGS);
}

function skipMode() {
  clearInterval(interval); running = false;
  timerDone();
}

function updateStats() {
  document.getElementById('stat-sessions').textContent = sessionsCompleted;
  document.getElementById('stat-breaks').textContent = breaksCompleted;
  document.getElementById('stat-time').textContent = totalMinutes;
}

function updateSessions() {
  var row = document.getElementById('sessions-row');
  row.innerHTML = '';
  for (var i = 0; i < Math.max(sessionsCompleted + 3, settings.cycle); i++) {
    var dot = document.createElement('div');
    dot.className = 'session-dot' + (i < sessionsCompleted ? ' done' : '');
    row.appendChild(dot);
  }
}

function toggleSettings() {
  var panel = document.getElementById('settings-panel');
  var arrow = document.getElementById('settings-arrow');
  var open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  arrow.classList.toggle('open', !open);
}

function applySettings() {
  settings.work = Math.max(1, parseInt(document.getElementById('set-work').value) || 25);
  settings.breakTime = Math.max(1, parseInt(document.getElementById('set-break').value) || 5);
  settings.longBreak = Math.max(5, parseInt(document.getElementById('set-long').value) || 15);
  settings.cycle = Math.max(2, parseInt(document.getElementById('set-cycle').value) || 4);
  setMode(mode, document.querySelector('.mode-tab.active'));
  showToast('Nastavení uloženo! ✓');
  toggleSettings();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

updateDisplay();
updateSessions();
</script>
</body>
</html>
